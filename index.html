<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const phrase = "I LOVE YOU";
const total = 55;
let angle = 0;

function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3); // трохи менше
    let y = 12 * Math.cos(t) 
            - 4 * Math.cos(2*t) 
            - 2 * Math.cos(3*t) 
            - Math.cos(4*t);
    return {x, y};
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let scale = Math.min(canvas.width, canvas.height) / 50; // менший масштаб
    let fontSize = Math.min(canvas.width, canvas.height) / 28; // менший текст

    ctx.fillStyle = "hotpink";
    ctx.font = "bold " + fontSize + "px Arial";
    ctx.textAlign = "center";

    for (let i = 0; i < total; i++) {

        let t = angle + i * (Math.PI * 2 / total);
        let pos = heart(t);

        let x = canvas.width / 2 + pos.x * scale;
        let y = canvas.height / 2 - pos.y * scale;

        ctx.fillText(phrase, x, y);
    }

    angle += 0.005; // ще повільніше
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
