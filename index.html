<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const phrase = "I LOVE YOU, VIK!";
const total = 65;
let angle = 0;

function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t);
    return {x, y};
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let scale = Math.min(canvas.width, canvas.height) / 45; // БІЛЬШЕ серце
    let fontSize = Math.min(canvas.width, canvas.height) / 34;

    ctx.fillStyle = "hotpink";
    ctx.font = "bold " + fontSize + "px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "hotpink";
    ctx.shadowBlur = 8;

    for (let i = 0; i < total; i++) {

        // головний фікс: окремий рух для кожного напису
        let t = (i / total) * (Math.PI * 2) + angle;

        let pos = heart(t);

        let x = canvas.width / 2 + pos.x * scale;
        let y = canvas.height / 2 - pos.y * scale;

        ctx.fillText(phrase, x, y);
    }

    angle += 0.0035; // плавно
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
